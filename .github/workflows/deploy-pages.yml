name: 部署 GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 取得原始碼
        uses: actions/checkout@v7

      - name: 設定 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: 安裝相依套件
        run: npm ci

      - name: 建立靜態網站
        run: npm run build:pages

      - name: 設定 Pages
        uses: actions/configure-pages@v6

      - name: 上傳靜態網站
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
