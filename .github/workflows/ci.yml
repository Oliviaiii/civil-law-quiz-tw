name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 取出程式碼
        uses: actions/checkout@v7

      - name: 設定 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: 安裝相依套件
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: 靜態建置與資料驗證測試
        run: npm test

      - name: 安裝 Playwright 瀏覽器
        run: npx playwright install --with-deps chromium

      - name: 瀏覽器互動測試
        run: npx playwright test
